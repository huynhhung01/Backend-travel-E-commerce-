<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <title>SSE Payment Demo</title>
</head>

<body>
    <h2>Trạng thái thanh toán:</h2>
    <div id="status">Đang chờ...</div>

    <script>
        const paymentId = '1-3';
        const sse = new EventSource(`http://localhost:3000/transactions/stream/${paymentId}`);

        sse.onmessage = (event) => {
            const data = JSON.parse(event.data);
            console.log('Nhận sự kiện:', data);
            document.getElementById('status').textContent = `Trạng thái: ${data.status}`;
            if (data.status === 'SUCCESS' || data.status === 'EXPIRED') {
                sse.close();
            }
        };

        // Gọi API mô phỏng backend bắt đầu gửi event
        // fetch(`http://localhost:3000/payments/simulate/${paymentId}`);
    </script>
</body>

</html>
